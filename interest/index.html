<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>複利早見表</title>

        <!-- スマートフォン表示対応 -->
        <meta name="viewport" content="width=device-width">

        <!-- フォントスタイル -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&display=swap" rel="stylesheet">
        <link href="http://fonts.googleapis.com/css?family=Abel" rel="stylesheet" type="text/css">
    
        <!-- JavaScript -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

        <!-- CSS -->
        <link rel="stylesheet" type="text/css" href="interest.css?ver=20260417a">
    </head>


    <body>
        <div id="simulation-tooltip">
            <div id="simulation-tooltip-arrow-border"></div>
            <div id="simulation-tooltip-arrow"></div>
            <div id="simulation-tooltip-content">
                <div class="table-wrapper" id="simulation-tooltip-table-wrapper">
                    <table id="simulation-tooltip-table-total">
                        <tbody>
                            <tr><td>プラン名</td><td id="simulation-tooltip-plan-name"></td></tr>
                            <tr><td>経過年数</td><td id="simulation-tooltip-total-month"></td></tr>
                            <tr><td>純利益(計)</td><td id="simulation-tooltip-total-gain"></td></tr>
                            <tr><td>積立額(計)</td><td id="simulation-tooltip-total-amount"></td></tr>
                            <tr><td>納税額(計)</td><td id="simulation-tooltip-total-tax"></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="background">
            <section class="section">
                <div class="section-head">
                    <h1>Configuration</h1>
                    <h2>シミュレーション設定</h2>
                    <div style="top: 20%; left:   6%;" class="shape medium green  circle"></div>
                    <div style="top: 50%; left:  14%;" class="shape large  orange square"></div>
                    <div style="top: 15%; right:  7%;" class="shape medium yellow square"></div>
                    <div style="top: 45%; right: 13%;" class="shape large  green  circle"></div>
                </div>
                <div class="section-body">
                    <div class="configuration-form">
                        <div class="form configuration-type">
                            <label for="configuration-type">早見表の種別</label>
                            <select id="configuration-type">
                                <option value=0>元金が何％増えるか</option>
                                <option value=1>元金が何％になるか</option>
                                <option value=2>元金が何円になるか</option>
                            </select>
                        </div>
                        <div class="form configuration-rate">
                            <label for="configuration-form-rate">最小利率</label>
                            <input type="number" step="0.01" id="configuration-form-rate-min">～
                            <input type="number" step="0.01" id="configuration-form-rate-max">％
                        </div>
                        <div class="form configuration-rate-step">
                            <label for="configuration-form-rate-step">利率の刻み幅</label>
                            <input type="number" step="0.01" id="configuration-form-rate-step">％ずつ
                        </div>
                        <div class="form configuration-years">
                            <label for="configuration-form-years">年数</label>
                            <input type="number" id="configuration-form-years">年間
                        </div>
                        <div class="form configuration-principal">
                            <label for="configuration-form-principal">元金</label>
                            <input type="number" id="configuration-form-principal">万円
                        </div>
                        <div class="form configuration-button">
                            <button type="button" class="request-button" id="simulation-button">
                                実行
                            </button>
                        </div>
                    </div>
                </div>
            </section>


            <section class="section" id="simulation">
                <div class="section-head">
                    <h1>Simulation</h1>
                    <h2>シミュレーション</h2>
                    <div style="top: 20%; left:   6%;" class="shape medium green  circle"></div>
                    <div style="top: 50%; left:  14%;" class="shape large  orange square"></div>
                    <div style="top: 15%; right:  7%;" class="shape medium yellow square"></div>
                    <div style="top: 45%; right: 13%;" class="shape large  green  circle"></div>
                </div>
                <div class="section-body">
                    <div class="table-wrapper" id="simulation-table">
                        <table>
                            <thead id="simulation-thead">
                            </thead>
                            <tbody id="simulation-tbody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div>
        <script src="interest.js?ver=20260417a"></script>
    </body>
</html>
