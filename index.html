<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>スマブラSP対戦記録</title>

        <!-- スマートフォン表示対応 -->
        <meta name="viewport" content="width=device-width">

        <!-- フォントスタイル -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&display=swap" rel="stylesheet">
        <link href="http://fonts.googleapis.com/css?family=Abel" rel="stylesheet" type="text/css">
    
        <!-- JavaScript -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

        <!-- CSS -->
        <link rel="stylesheet" type="text/css" href="fire.css?ver=20260407a">
    </head>


    <body>
        <div id="background">
            <section class="section">
                <div class="section-head">
                    <h1>Edit</h1>
                    <h2>プラン編集</h2>
                    <div style="top: 20%; left:   6%;" class="shape medium green  circle"></div>
                    <div style="top: 50%; left:  14%;" class="shape large  orange square"></div>
                    <div style="top: 15%; right:  7%;" class="shape medium yellow square"></div>
                    <div style="top: 45%; right: 13%;" class="shape large  green  circle"></div>
                </div>
                <div class="section-body">
                    <div class="table-wrapper">
                        <select id="edit-select">
                            <option>planA</option>
                            <option>planA</option>
                            <option>planA</option>
                        </select>
                        <button type="button" id="edit-select-button">編集</button>
                    </div>
                </div>
            </section>


            <section class="section">
                <div class="section-head">
                    <h1>Progress</h1>
                    <h2>進捗確認</h2>
                    <div style="top: 20%; left:   6%;" class="shape medium green  circle"></div>
                    <div style="top: 50%; left:  14%;" class="shape large  orange square"></div>
                    <div style="top: 15%; right:  7%;" class="shape medium yellow square"></div>
                    <div style="top: 45%; right: 13%;" class="shape large  green  circle"></div>
                </div>
                <div class="section-body">
                    <div class="register-form">
                        <div class="input register-form-rate">
                            <label for="progress-form-assets">現在資産</label>
                            <input type="number" id="progress-form-assets">万
                            <button type="button" class="request-button" id="progress-button">
                                確認
                            </button>
                        </div>
                    </div>
                    <div class="table-wrapper" id="progress-table">
                        <table>
                            <thead id="progress-thead">
                                <tr>
                                    <th>プラン</td>
                                    <th>目標額</td>
                                    <th>差</td>
                                    <th>比</td>
                                </tr>
                            </thead>
                            <tbody id="progress-tbody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>


            <section class="section" id="simulation">
                <div class="section-head">
                    <h1>Simulate</h1>
                    <h2>シミュレーション</h2>
                    <div style="top: 20%; left:   6%;" class="shape medium green  circle"></div>
                    <div style="top: 50%; left:  14%;" class="shape large  orange square"></div>
                    <div style="top: 15%; right:  7%;" class="shape medium yellow square"></div>
                    <div style="top: 45%; right: 13%;" class="shape large  green  circle"></div>
                </div>
                <div class="section-body">
                    <div class="table-wrapper" id="simulate-table">
                        <table>
                            <thead id="simulate-thead">
                            </thead>
                            <tbody id="simulate-tbody">
                            </tbody>
                        </table>
                    </div>
                    <div class="register-form">
                        <button type="button" class="request-button" id="simulate-button">
                            実行
                        </button>
                    </div>
                </div>
            </section>


            <dialog class="dialog" id="dialog" autofocus>
                <button type="button" id="dialog-close-button">×</button>
                <section class="dialog-section" id="edit-plan">
                    <div class="section-body">
                        <div class="edit-plan">
                            <h3>基本設定</h3>
                            <input type="number" id="edit-plan-id" disabled hidden>
                            <div class="form edit-plan-name">
                                <label for="edit-plan-plan-name">プラン名</label>
                                <input type="text" id="edit-plan-name" placeholder="(例) 月4%+積立3万">
                            </div>
                            <div class="form edit-plan-start-value">
                                <label for="edit-plan-start-value">開始額</label>
                                <input type="number" id="edit-plan-start-value" placeholder="万">万
                            </div>
                            <div class="form edit-plan-start-year">
                                <label for="edit-plan-start-year">開始年/月</label>
                                <input type="number" id="edit-plan-start-year" min="2020" max="2040">/
                                <input type="number" id="edit-plan-start-month" min="1" max="12">
                            </div>
                            <h3>詳細設定</h3>
                            <div class="table-wrapper">
                                <table>
                                    <thead>
                                        <tr>
                                            <th class="">期間</th>
                                            <th class="">月利</th>
                                            <th class="">毎月積立</th>
                                            <th></th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody id="edit-plan-details">
                                        <tr>
                                            <td><input type="number" class="edit-plan-form-term" min="1" max="30">年</td>
                                            <td><input type="number" class="edit-plan-form-rate" step="0.1">％</td>
                                            <td><input type="number" class="edit-plan-form-amount">万</td>
                                            <td><button type="button" class="edit-plan-form-remove">-</button></td>
                                            <td><button type="button" class="edit-plan-form-insert">+</button></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
                <section class="dialog-section">
                    <button type="button" class="request-button edit-plan-request-button" id="edit-plan-request-button">
                        登録
                    </button>
                </section>
            </dialog>

        </div>

        <script src="fire.js?ver=20260407a"></script>

    </body>
</html>
